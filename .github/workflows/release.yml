name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to tag and release, without v prefix"
        required: true
        type: string
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    concurrency:
      group: release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - name: Validate Homebrew tap access
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || 'marcel-breuer/homebrew-tap' }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN must be set to update ${HOMEBREW_TAP_REPOSITORY}." >&2
            exit 1
          fi
          git ls-remote "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" HEAD >/dev/null
      - name: Resolve release version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            LATEST_TAG="$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')"
            if [[ -z "$LATEST_TAG" ]]; then
              LATEST_TAG="$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1)"
            fi
            if [[ -z "$LATEST_TAG" ]]; then
              VERSION="0.1.0"
            else
              VERSION="${LATEST_TAG#v}"
              IFS=. read -r MAJOR MINOR PATCH <<< "$VERSION"
              PATCH="$((PATCH + 1))"
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use MAJOR.MINOR.PATCH format: $VERSION" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1 || gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
      - name: Package ARM64 app
        run: ./scripts/package-release.sh "$VERSION"
      - name: Resolve Homebrew cask checksum
        id: cask
        run: |
          SHA="$(awk '{print $1}' "dist/TokenGlance-${VERSION}-arm64.zip.sha256")"
          if [[ ! "$SHA" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Invalid SHA-256 checksum: $SHA" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" \
            "dist/TokenGlance-${VERSION}-arm64.zip" \
            "dist/TokenGlance-${VERSION}-arm64.zip.sha256" \
            --notes-file CHANGELOG.md
      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || 'marcel-breuer/homebrew-tap' }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SHA: ${{ steps.cask.outputs.sha }}
        run: |
          if [[ -z "$HOMEBREW_TAP_TOKEN" ]]; then
            echo "HOMEBREW_TAP_TOKEN must be set to update ${HOMEBREW_TAP_REPOSITORY}." >&2
            exit 1
          fi

          TAP_DIR="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPOSITORY}.git" "$TAP_DIR"

          mkdir -p "$TAP_DIR/Casks"
          cp Casks/tokenglance.rb "$TAP_DIR/Casks/tokenglance.rb"
          CASK_PATH="$TAP_DIR/Casks/tokenglance.rb" ./scripts/update-cask-sha.sh "$VERSION" "$SHA"

          git -C "$TAP_DIR" config user.name "github-actions[bot]"
          git -C "$TAP_DIR" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$TAP_DIR" add Casks/tokenglance.rb

          if git -C "$TAP_DIR" diff --cached --quiet; then
            echo "Homebrew tap already has TokenGlance ${VERSION}."
            exit 0
          fi

          git -C "$TAP_DIR" commit -m "chore(cask): update tokenglance to ${VERSION}"
          git -C "$TAP_DIR" push origin HEAD
